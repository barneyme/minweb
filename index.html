<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Blog</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font:
                    1em/1.6 Georgia,
                    serif;
                color: #333;
                background: #f5f5f5;
                padding: 20px;
            }
            .b {
                max-width: 800px;
                margin: 0 auto;
                background: #fff;
                padding: 40px;
                box-shadow: 0 2px 10px #0002;
                border-radius: 8px;
            }
            header {
                border-bottom: 2px solid #333;
                padding-bottom: 20px;
                margin-bottom: 30px;
            }
            h1 {
                font-size: 2.5em;
                cursor: pointer;
                display: inline-block;
            }
            .s {
                color: #666;
                font: italic 1.1em serif;
            }
            .T {
                font-size: 1.8em;
                margin-bottom: 10px;
                color: #222;
            }
            .C {
                white-space: pre-wrap;
                color: #444;
                line-height: 1.8;
            }
            a {
                color: #06c;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            .n {
                display: flex;
                justify-content: space-between;
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid #ddd;
                color: #666;
                font-size: 0.9em;
            }
            .l {
                cursor: pointer;
            }
            .l:hover:not(.d) {
                color: #333;
            }
            .d {
                color: #ccc;
                cursor: not-allowed;
            }
            #h,
            #c,
            #o {
                display: none;
            }
            #o {
                border-bottom: 1px solid #eee;
                padding: 10px 0;
                margin-bottom: 20px;
                font-size: 0.9em;
            }
            .th {
                display: flex;
                justify-content: space-between;
                color: #888;
                cursor: pointer;
            }
            .ta {
                transition: 0.3s;
            }
            .ta.open {
                transform: rotate(180deg);
            }
            .tl {
                max-height: 0;
                overflow: hidden;
                transition: 0.3s;
            }
            .tl.open {
                max-height: 300px;
                overflow-y: auto;
                margin-top: 10px;
                padding-right: 5px;
            }
            .ti {
                padding: 6px 0;
                cursor: pointer;
                color: #999;
            }
            .ti.active {
                color: #555;
                font-weight: bold;
            }
            .f {
                text-align: center;
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid #ddd;
                font-size: 0.9em;
            }
            .tl::-webkit-scrollbar {
                width: 5px;
            }
            .tl::-webkit-scrollbar-thumb {
                background: #ddd;
                border-radius: 10px;
            }
            #e {
                color: #d00;
                background: #fee;
                display: none;
                padding: 10px;
                margin-bottom: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="b">
            <div id="e"></div>
            <header id="h">
                <h1 id="t"></h1>
                <p class="s" id="u"></p>
            </header>
            <div id="o">
                <div class="th" id="tocToggle">
                    <span>Contents</span><span class="ta" id="A">▼</span>
                </div>
                <div class="tl" id="L"></div>
            </div>
            <div id="c">
                <article>
                    <h2 class="T" id="P"></h2>
                    <div class="C" id="B"></div>
                </article>
                <div class="n">
                    <span class="l" id="prev">← Last</span>
                    <span><span id="v">1</span> of <span id="m">1</span></span>
                    <span class="l" id="next">Next →</span>
                </div>
            </div>
            <div class="f">
                <span class="l" id="loadTrigger">Load web.txt</span
                ><input type="file" id="F" accept=".txt" hidden />
            </div>
        </div>
        <script>
            (() => {
                const $ = (id) => document.getElementById(id);
                const R = /https?:\/\/[^\s<>"'()&]+/g;
                let posts = [],
                    idx = 0;

                const esc = (s) =>
                    String(s)
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&#39;");

                const linkify = (t) => {
                    const urls = t.match(R) || [];
                    return t
                        .split(R)
                        .map(
                            (p, i) =>
                                esc(p) +
                                (urls[i]
                                    ? `<a href="${esc(urls[i])}" target="_blank" rel="noopener noreferrer">${esc(urls[i])}</a>`
                                    : ""),
                        )
                        .join("");
                };

                const err = (msg) => {
                    $("e").innerText = msg;
                    $("e").style.display = msg ? "block" : "none";
                    ["h", "c", "o"].forEach(
                        (id) => ($(id).style.display = "none"),
                    );
                };

                const show = () => {
                    $("e").style.display = "none";
                    $("h").style.display = $("c").style.display = "block";
                    $("o").style.display = posts.length > 1 ? "block" : "none";
                };

                const syncHash = () => {
                    const n = parseInt(location.hash.slice(1), 10);
                    idx = isNaN(n)
                        ? 0
                        : Math.max(0, Math.min(posts.length - 1, n - 1));
                };

                const render = () => {
                    const p = posts[idx];
                    if (!p) return;
                    $("P").innerText = p.t;
                    $("B").innerHTML = linkify(p.c.trim());
                    $("v").innerText = idx + 1;
                    $("m").innerText = posts.length;
                    $("prev").classList.toggle("d", idx === 0);
                    $("next").classList.toggle("d", idx === posts.length - 1);
                    document
                        .querySelectorAll(".ti")
                        .forEach((el, i) =>
                            el.classList.toggle("active", i === idx),
                        );
                    location.hash !== "#" + (idx + 1) &&
                        history.pushState(null, "", "#" + (idx + 1));
                    scrollTo(0, 0);
                };

                const parse = (text) => {
                    posts = [];
                    const lines = text.split("\n");
                    if (lines.length < 2) return err("Invalid file format.");
                    $("t").innerText = document.title = lines[0].trim();
                    $("u").innerText = lines[1].trim();
                    let cur = null;
                    for (const l of lines.slice(2)) {
                        if (l.startsWith("---")) {
                            if (cur) posts.push(cur);
                            cur = { t: "", c: "" };
                        } else if (cur)
                            cur.t ? (cur.c += l + "\n") : (cur.t = l.trim());
                    }
                    if (cur) posts.push(cur);
                    if (!posts.length) return err("No posts found.");
                    $("L").innerHTML = posts
                        .map(
                            (p, i) =>
                                `<div class="ti" data-i="${i}">${i + 1}. ${esc(p.t)}</div>`,
                        )
                        .join("");
                    document.querySelectorAll(".ti").forEach((el) =>
                        el.addEventListener("click", (e) => {
                            idx = +e.currentTarget.dataset.i;
                            $("L").classList.remove("open");
                            $("A").classList.remove("open");
                            render();
                        }),
                    );
                    syncHash();
                    show();
                    render();
                };

                $("tocToggle").addEventListener("click", () =>
                    [$("L"), $("A")].forEach((el) =>
                        el.classList.toggle("open"),
                    ),
                );
                $("loadTrigger").addEventListener("click", () =>
                    $("F").click(),
                );
                $("F").addEventListener("change", (e) => {
                    const f = e.target.files[0];
                    e.target.value = "";
                    if (!f) return;
                    if (f.size > 2097152)
                        return err("File too large (max 2MB).");
                    const r = new FileReader();
                    r.onload = (e) => parse(e.target.result);
                    r.readAsText(f);
                });
                $("t").addEventListener("click", () => {
                    if (idx) {
                        idx = 0;
                        render();
                    }
                });
                $("prev").addEventListener("click", () => {
                    if (idx > 0) {
                        idx--;
                        render();
                    }
                });
                $("next").addEventListener("click", () => {
                    if (idx < posts.length - 1) {
                        idx++;
                        render();
                    }
                });
                window.addEventListener("hashchange", () => {
                    if (posts.length) {
                        syncHash();
                        render();
                    }
                });
                fetch("web.txt")
                    .then((r) => {
                        if (!r.ok) throw 0;
                        return r.text();
                    })
                    .then(parse)
                    .catch(() =>
                        err(
                            "Could not load 'web.txt'. Load a file manually below.",
                        ),
                    );
            })();
        </script>
    </body>
</html>
